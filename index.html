<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>What's Your Pour Personality?</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .title { font-family: 'Playfair Display', serif; }
    .beer-glow { text-shadow: 0 0 40px #facc15, 0 0 80px #facc15; }
  </style>
</head>
<body class="bg-[#1a0f08] text-white min-h-screen overflow-hidden relative">

  <div class="fixed inset-0 bg-[url('/assets/main-background.png')] bg-cover bg-center opacity-90"></div>

  <div class="relative z-10 min-h-screen flex flex-col">

    <!-- Splash -->
    <div id="splash" class="fixed inset-0 flex items-center justify-center bg-black z-50">
      <div class="text-center">
        <div class="text-9xl mb-6 animate-bounce">🍺</div>
        <h1 class="text-8xl font-black title beer-glow text-yellow-400">POUR</h1>
        <p class="text-xl mt-6 text-white/70">Discover your soul brew...</p>
      </div>
    </div>

    <!-- Hero -->
    <div id="hero" class="hidden min-h-screen flex flex-col items-center justify-center text-center px-6">
      <h1 class="text-6xl md:text-8xl font-black title leading-none mb-8 beer-glow">
        WHAT’S YOUR<br><span class="text-yellow-400">POUR</span> PERSONALITY?
      </h1>
      <button onclick="startQuiz()" 
        class="mt-12 px-16 py-8 bg-yellow-400 hover:bg-yellow-300 text-black font-bold text-3xl rounded-3xl shadow-2xl transition-all">
        START THE QUIZ 🍺
      </button>
    </div>

    <!-- Quiz -->
    <div id="quiz" class="hidden min-h-screen flex items-center justify-center p-6">
      <div class="max-w-2xl w-full">
        <div class="text-center mb-12">
          <p class="text-sm text-white/60" id="question-count">Question 1 of 3</p>
          <h2 id="question" class="text-4xl font-bold mt-4"></h2>
        </div>
        <div id="options" class="space-y-4"></div>
      </div>
    </div>

    <!-- Result -->
    <div id="result" class="hidden fixed inset-0 flex flex-col items-center justify-center bg-black z-50">
      <video id="result-video" autoplay loop muted class="absolute inset-0 w-full h-full object-cover opacity-75"></video>
      
      <div class="relative z-10 text-center px-6">
        <h1 id="beer-name" class="text-8xl font-black text-yellow-400 mb-4"></h1>
        <p id="beer-tag" class="text-3xl mb-12 max-w-md"></p>
        <button onclick="restartQuiz()" 
          class="px-16 py-7 bg-yellow-400 text-black font-bold text-2xl rounded-full hover:bg-yellow-300 transition-all">
          POUR AGAIN 🍺
        </button>
      </div>
    </div>
  </div>

  <script>
    let currentQuestion = 0;
    let scores = { budweiser: 0, corona: 0, kingfisher: 0 };

    const questions = [
      {
        q: "What's your ideal weekend vibe?",
        options: ["Party with friends", "Beach chill", "Cricket match", "Quiet pub"],
        scores: [2, 1, 0, 1]
      },
      {
        q: "You prefer your beer...",
        options: ["Bold & Strong", "Light & Fresh", "Royal & Strong", "Anytime Fun"],
        scores: [2, 1, 0, 1]
      },
      {
        q: "Favourite hangout place?",
        options: ["Loud Pub", "Beach Bar", "Stadium", "Home Balcony"],
        scores: [2, 1, 0, 1]
      }
    ];

    function startQuiz() {
      document.getElementById('splash').classList.add('hidden');
      document.getElementById('hero').classList.add('hidden');
      document.getElementById('quiz').classList.remove('hidden');
      currentQuestion = 0;
      scores = { budweiser: 0, corona: 0, kingfisher: 0 };
      showQuestion();
    }

    function showQuestion() {
      const q = questions[currentQuestion];
      document.getElementById('question').textContent = q.q;
      document.getElementById('question-count').textContent = `Question ${currentQuestion + 1} of ${questions.length}`;

      const optionsDiv = document.getElementById('options');
      optionsDiv.innerHTML = '';

      q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = "w-full p-8 bg-white/10 hover:bg-white/20 rounded-3xl text-2xl transition-all text-left";
        btn.textContent = opt;
        btn.onclick = () => {
          // Add score
          if (i === 0) scores.budweiser += 2;
          else if (i === 1) scores.corona += 2;
          else if (i === 2) scores.kingfisher += 2;

          if (currentQuestion < questions.length - 1) {
            currentQuestion++;
            showQuestion();
          } else {
            showResult();
          }
        };
        optionsDiv.appendChild(btn);
      });
    }

    function showResult() {
      document.getElementById('quiz').classList.add('hidden');
      const resultScreen = document.getElementById('result');
      resultScreen.classList.remove('hidden');

      let winner = 'budweiser';
      if (scores.corona > scores.budweiser && scores.corona > scores.kingfisher) winner = 'corona';
      else if (scores.kingfisher > scores.budweiser && scores.kingfisher > scores.corona) winner = 'kingfisher';

      const data = {
        budweiser: { name: "Budweiser", tag: "The King of Beers – Bold & Social", video: "budweiser.mp4" },
        corona: { name: "Corona", tag: "Find Your Beach", video: "corona.mp4" },
        kingfisher: { name: "Kingfisher", tag: "The True Taste of India", video: "kingfisher.mp4" }
      };

      document.getElementById('beer-name').textContent = data[winner].name;
      document.getElementById('beer-tag').textContent = data[winner].tag;
      document.getElementById('result-video').src = `/assets/${data[winner].video}`;
    }

    function restartQuiz() {
      document.getElementById('result').classList.add('hidden');
      document.getElementById('hero').classList.remove('hidden');
    }

    // Start with splash
    setTimeout(() => {
      document.getElementById('splash').classList.add('hidden');
      document.getElementById('hero').classList.remove('hidden');
    }, 2500);
  </script>
</body>
</html>
