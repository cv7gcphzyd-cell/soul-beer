<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Beer Personality Quiz</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    body { font-family: system-ui, sans-serif; }
    .beer-glow { text-shadow: 0 0 30px #facc15; }
  </style>
</head>
<body class="bg-[#1a0f08] text-white min-h-screen overflow-hidden relative">

  <div class="fixed inset-0 bg-[url('https://via.placeholder.com/1920x1080/2C1A0F/3C2A1F?text=BEER+BACKGROUND')] bg-cover opacity-80"></div>

  <div class="relative z-10 min-h-screen flex flex-col items-center justify-center p-6 text-center">

    <h1 class="text-7xl md:text-8xl font-black beer-glow mb-8">WHAT’S YOUR<br><span class="text-yellow-400">POUR</span> PERSONALITY?</h1>

    <button onclick="startQuiz()" 
      class="mt-10 px-16 py-8 bg-yellow-400 hover:bg-yellow-300 text-black font-bold text-3xl rounded-3xl shadow-2xl transition-all">
      START THE QUIZ 🍺
    </button>

  </div>

  <script>
    function startQuiz() {
      alert("Quiz Started! (This is a simple demo version)\n\nIn full version you will get questions + result video.");
    }
  </script>
</body>
</html>
