<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Beer Personality Quiz</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .glow { text-shadow: 0 0 30px #facc15; }
  </style>
</head>
<body class="bg-[#1a0f08] text-white min-h-screen overflow-hidden">

  <!-- Background -->
  <div class="fixed inset-0 bg-[url('/assets/main-background.png')] bg-cover bg-center opacity-80"></div>

  <div class="relative z-10 min-h-screen flex flex-col items-center justify-center px-6 text-center">

    <!-- Splash -->
    <div id="splash">
      <div class="text-9xl mb-6 animate-bounce">🍺</div>
      <h1 class="text-8xl font-black glow text-yellow-400">POUR</h1>
      <p class="text-xl mt-4">Finding your soul brew...</p>
    </div>

    <!-- Hero -->
    <div id="hero" class="hidden">
      <h1 class="text-6xl md:text-8xl font-black leading-none mb-10 glow">
        WHAT’S YOUR<br><span class="text-yellow-400">POUR</span> PERSONALITY?
      </h1>
      <button onclick="startQuiz()" class="mt-10 px-16 py-8 bg-yellow-400 text-black font-bold text-3xl rounded-3xl">
        START THE QUIZ 🍺
      </button>
    </div>

    <!-- Quiz -->
    <div id="quiz" class="hidden w-full max-w-xl">
      <p id="progress" class="text-white/60 mb-4"></p>
      <h2 id="question" class="text-4xl font-bold mb-10"></h2>
      <div id="options" class="space-y-4"></div>
    </div>

    <!-- Result -->
    <div id="result" class="hidden fixed inset-0 flex flex-col items-center justify-center bg-black">
      <video id="video" autoplay loop muted class="absolute inset-0 w-full h-full object-cover opacity-70"></video>
      <div class="relative z-10 text-center px-6">
        <h1 id="beer-name" class="text-8xl font-black text-yellow-400 mb-4"></h1>
        <p id="beer-tag" class="text-3xl mb-12"></p>
        <button onclick="restart()" class="px-16 py-7 bg-yellow-400 text-black font-bold text-2xl rounded-full">
          POUR AGAIN 🍺
        </button>
      </div>
    </div>
  </div>

  <script>
    let current = 0;
    let scores = { budweiser: 0, corona: 0, kingfisher: 0 };

    const questions = [
      { q: "What's your ideal weekend?", options: ["Party with friends", "Beach day", "Cricket match", "Quiet pub"] },
      { q: "You prefer your beer?", options: ["Bold & Strong", "Light & Fresh", "Strong & Royal", "Anytime fun"] },
      { q: "Favourite hangout?", options: ["Loud Pub", "Beach Bar", "Stadium", "Home"] }
    ];

    function startQuiz() {
      document.getElementById('splash').style.display = 'none';
      document.getElementById('hero').classList.add('hidden');
      document.getElementById('quiz').classList.remove('hidden');
      current = 0;
      scores = { budweiser: 0, corona: 0, kingfisher: 0 };
      showQuestion();
    }

    function showQuestion() {
      const q = questions[current];
      document.getElementById('question').textContent = q.q;
      document.getElementById('progress').textContent = `Question ${current + 1} of 3`;

      const container = document.getElementById('options');
      container.innerHTML = '';

      q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = "w-full p-8 bg-white/10 hover:bg-white/20 rounded-3xl text-xl transition-all";
        btn.textContent = opt;
        btn.onclick = () => {
          if (i === 0) scores.budweiser += 2;
          else if (i === 1) scores.corona += 2;
          else scores.kingfisher += 2;

          if (current < 2) {
            current++;
            showQuestion();
          } else {
            showResult();
          }
        };
        container.appendChild(btn);
      });
    }

    function showResult() {
      document.getElementById('quiz').classList.add('hidden');
      const res = document.getElementById('result');
      res.classList.remove('hidden');

      let winner = scores.budweiser >= scores.corona && scores.budweiser >= scores.kingfisher ? 'budweiser' : 
                   scores.corona >= scores.kingfisher ? 'corona' : 'kingfisher';

      const data = {
        budweiser: { name: "Budweiser", tag: "The King of Beers", video: "budweiser.mp4" },
        corona: { name: "Corona", tag: "Find Your Beach", video: "corona.mp4" },
        kingfisher: { name: "Kingfisher", tag: "The True Taste of India", video: "kingfisher.mp4" }
      };

      document.getElementById('beer-name').textContent = data[winner].name;
      document.getElementById('beer-tag').textContent = data[winner].tag;
      document.getElementById('video').src = `/assets/${data[winner].video}`;
    }

    function restart() {
      location.reload();
    }

    // Auto start
    setTimeout(() => {
      document.getElementById('splash').style.display = 'none';
      document.getElementById('hero').classList.remove('hidden');
    }, 2200);
  </script>
</body>
</html>
